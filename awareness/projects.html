<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' http://127.0.0.1:4175 https://api.anthropic.com https://api.openai.com https://api.allorigins.win https://corsproxy.io https://api.codetabs.com https://api.rss2json.com https:; frame-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>Projects - Awareness Newsletter</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    body{margin:0;background:#0a0a0a;color:#fff;font-family:'DM Sans',sans-serif}
    .wrap{max-width:1100px;margin:0 auto;padding:1.2rem}
    .nav{display:flex;gap:.5rem;flex-wrap:wrap;margin-bottom:.75rem}
    .toolbar{display:flex;gap:.5rem;flex-wrap:wrap;align-items:center;margin-bottom:.75rem}
    .btn{border:1px solid rgba(255,255,255,.2);background:transparent;color:#ddd;padding:.4rem .7rem;border-radius:6px;cursor:pointer}
    .btn.primary{border-color:#d4a420;color:#d4a420}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:.7rem}
    .list{display:flex;flex-direction:column;gap:.55rem}
    .card{border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:.8rem;background:#121212}
    .meta{font-size:.75rem;color:#b4b4b4}
    .rowline{display:flex;gap:.45rem;align-items:center;flex-wrap:wrap}
    input,select{background:#171717;border:1px solid rgba(255,255,255,.15);color:#fff;padding:.45rem .55rem;border-radius:6px}
    @media (max-width: 640px){
      .wrap{padding:.75rem}
      .btn{flex:1;min-width:120px;text-align:center}
      #projects.grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1 style="font-family:'DM Serif Display',serif;margin:.2rem 0 1rem">Projects</h1>
    <div class="nav">
      <button class="btn primary" id="new-project">Create New Project</button>
      <button class="btn" onclick="App.RouterNav.goto('index.html#section-home', { source: 'projects', clearProjectContext: true })">Home</button>
      <button class="btn" onclick="App.RouterNav.goto('preview.html', App.RouterNav.getHandoff() || { source: 'projects' })">Preview</button>
      <button class="btn" onclick="App.RouterNav.goto('editor.html', App.RouterNav.getHandoff() || { source: 'projects' })">Editor</button>
      <button class="btn" onclick="App.RouterNav.goto('send.html', App.RouterNav.getHandoff() || { source: 'projects' })">Send</button>
      <button class="btn" onclick="window.location.href='keywords.html'">Keywords</button>
      <button class="btn" onclick="window.location.href='config.html'">Config</button>
      <button class="btn" onclick="App.RouterNav.goto('index.html#section-home', { source: 'projects', clearProjectContext: true })">Legacy Single-Page</button>
      <input id="search" placeholder="Search projects...">
    </div>
    <div class="toolbar">
      <select id="status-filter">
        <option value="all">All status</option>
        <option value="draft">Draft</option>
        <option value="review">Review</option>
        <option value="approved">Approved</option>
        <option value="sent">Sent</option>
        <option value="archived">Archived</option>
      </select>
      <select id="type-filter">
        <option value="all">All types</option>
        <option value="newsletter">Newsletters</option>
        <option value="poster">Posters</option>
        <option value="advisory">Advisories</option>
      </select>
      <select id="date-filter">
        <option value="all">Any date</option>
        <option value="7">Updated in 7 days</option>
        <option value="30">Updated in 30 days</option>
        <option value="90">Updated in 90 days</option>
      </select>
      <select id="sort-by">
        <option value="updatedAt-desc">Updated (newest)</option>
        <option value="updatedAt-asc">Updated (oldest)</option>
        <option value="title-asc">Title (A-Z)</option>
        <option value="title-desc">Title (Z-A)</option>
        <option value="createdAt-desc">Created (newest)</option>
      </select>
      <div class="rowline">
        <button class="btn" id="view-grid">Grid</button>
        <button class="btn" id="view-list">List</button>
      </div>
    </div>
    <div id="stats" class="meta" style="margin-bottom:.75rem"></div>
    <div id="projects" class="grid"></div>
  </div>

  <script src="js/db.js"></script>
  <script src="js/advisory_db.js"></script>
  <script src="js/router_nav.js"></script>
  <script src="js/ux_contract.js"></script>
  <script src="js/project_store.js"></script>
  <script>
    App.UXContract?.init({ pageId: 'projects', flowStepId: 'approve' });
    let viewMode = 'grid';

    function withinDays(ts, days) {
      if (!days || days === 'all') return true;
      const ms = Number(days) * 24 * 60 * 60 * 1000;
      return (Date.now() - new Date(ts || 0).getTime()) <= ms;
    }

    function sortItems(items, sortBy) {
      const [field, dir] = (sortBy || 'updatedAt-desc').split('-');
      const sign = dir === 'asc' ? 1 : -1;
      return [...items].sort((a, b) => {
        const ra = a.record, rb = b.record;
        if (field === 'title') return ((ra.title || '').localeCompare(rb.title || '')) * sign;
        return ((new Date(ra[field] || 0).getTime()) - (new Date(rb[field] || 0).getTime())) * sign;
      });
    }

    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function kindBadge(kind) {
      const label = kind === 'advisory' ? 'Advisory' : kind === 'poster' ? 'Poster' : 'Newsletter';
      const color = kind === 'advisory' ? '#e8c879' : kind === 'poster' ? '#7fd1b9' : '#9ab4ff';
      return `<span class="meta" style="border:1px solid ${color};color:${color};border-radius:999px;padding:.05rem .55rem;font-size:.62rem;text-transform:uppercase;letter-spacing:.05em">${label}</span>`;
    }

    function projectCardHtml(p, kind) {
      const snaps = Array.isArray(p.snapshots) ? [...p.snapshots].sort((a, b) => Number(b.version) - Number(a.version)) : [];
      let versionOpts = `<option value="">Current (v${p.version || 1})</option>`;
      for (const s of snaps) {
        const label = `v${s.version} — ${s.capturedAt ? new Date(s.capturedAt).toLocaleString() : ''}`;
        versionOpts += `<option value="${s.version}">${label.replace(/</g, '')}</option>`;
      }
      const pid = String(p.projectId || '').replace(/"/g, '');
      return `
        <div class="card" data-project-id="${pid}">
          <div style="display:flex;justify-content:space-between;gap:.6rem;align-items:flex-start;flex-wrap:wrap">
            <strong>${esc(p.title || 'Untitled Project')}</strong>
            <span class="rowline" style="gap:.35rem">${kindBadge(kind)}<span class="meta">${esc(p.status || 'draft')}</span></span>
          </div>
          <div class="meta" style="margin:.35rem 0">
            Owner: ${esc(p.owner || 'Unassigned')} · Created: ${new Date(p.createdAt || Date.now()).toLocaleDateString()} · Updated: ${new Date(p.updatedAt || Date.now()).toLocaleString()}
          </div>
          <label class="meta" style="display:flex;flex-direction:column;gap:.25rem;margin:.35rem 0;width:100%;min-width:0">
            <span>Version to open</span>
            <select class="proj-version-select" aria-label="Version to open" style="max-width:100%;background:#191919;border:1px solid rgba(255,255,255,.16);color:#fff;padding:.4rem .55rem;border-radius:6px">${versionOpts}</select>
          </label>
          <div style="display:flex;gap:.4rem;flex-wrap:wrap">
            <button class="btn primary" type="button" onclick="openProjectFromCard(this)">Open</button>
            <button class="btn" onclick="renameProject('${pid}')">Rename</button>
            <button class="btn" onclick="duplicateProject('${pid}')">Duplicate</button>
            <button class="btn" onclick="archiveProject('${pid}')">Archive</button>
            <button class="btn" onclick="setProjectStatus('${pid}','review')">To Review</button>
            <button class="btn" onclick="setProjectStatus('${pid}','approved')">Approve</button>
            <button class="btn" onclick="deleteProject('${pid}')">Delete</button>
            <button class="btn" onclick="App.RouterNav.goto('send.html',{ projectId: '${pid}' })">Quick Send</button>
          </div>
        </div>`;
    }

    function advisoryCardHtml(adv) {
      const id = String(adv.id || '').replace(/"/g, '');
      const cves = (adv.cveIds || []).join(', ');
      const sevs = (adv.severities || []).join(' · ');
      const srcs = (adv.sources || []).join(', ');
      const when = new Date(adv.createdAt || adv.updatedAt || Date.now()).toLocaleString();
      return `
        <div class="card" data-advisory-id="${id}">
          <div style="display:flex;justify-content:space-between;gap:.6rem;align-items:flex-start;flex-wrap:wrap">
            <strong>${esc(adv.title || 'Advisory')}</strong>
            ${kindBadge('advisory')}
          </div>
          <div class="meta" style="margin:.35rem 0">${esc(cves || '—')}${sevs ? ' · ' + esc(sevs) : ''}${srcs ? ' · ' + esc(srcs) : ''}</div>
          <div class="meta" style="margin:.35rem 0">Saved: ${esc(when)}</div>
          <div style="display:flex;gap:.4rem;flex-wrap:wrap">
            <button class="btn primary" type="button" onclick="openAdvisoryFromCard(this)">Open</button>
            <button class="btn" type="button" onclick="deleteAdvisoryFromCard(this)">Delete</button>
          </div>
        </div>`;
    }

    async function render() {
      await App.ProjectStore.ensureMigrated();
      const projects = await App.ProjectStore.list();
      let advisories = [];
      try {
        if (App.AdvisoryDB && App.AdvisoryDB.getAllAdvisories) advisories = await App.AdvisoryDB.getAllAdvisories();
      } catch (e) { advisories = []; }

      const q = (document.getElementById('search').value || '').trim().toLowerCase();
      const status = document.getElementById('status-filter').value;
      const dateRange = document.getElementById('date-filter').value;
      const typeFilter = document.getElementById('type-filter').value;
      const sortBy = document.getElementById('sort-by').value;

      // Read-merge: posters/newsletters from the projects store, advisories from
      // their own DB. Each item carries a `kind` for the Type filter + badge.
      const items = [];
      for (const p of projects) items.push({ kind: App.ProjectStore.classifyKind(p), record: p, isAdvisory: false });
      for (const a of advisories) items.push({ kind: 'advisory', record: a, isAdvisory: true });

      const filtered = items.filter(({ kind, record }) => {
        const cveText = Array.isArray(record.cveIds) ? record.cveIds.join(' ') : '';
        const okText = !q
          || (record.title || '').toLowerCase().includes(q)
          || (record.owner || '').toLowerCase().includes(q)
          || cveText.toLowerCase().includes(q);
        const recStatus = record.status || (kind === 'advisory' ? 'advisory' : 'draft');
        const okStatus = status === 'all' || recStatus === status;
        const okDate = withinDays(record.updatedAt || record.createdAt, dateRange);
        const okType = typeFilter === 'all' || kind === typeFilter;
        return okText && okStatus && okDate && okType;
      });

      const ordered = sortItems(filtered, sortBy);
      document.getElementById('stats').textContent = `${ordered.length} item(s) · ${viewMode} view`;
      const projectsEl = document.getElementById('projects');
      projectsEl.className = viewMode === 'list' ? 'list' : 'grid';
      projectsEl.innerHTML = ordered
        .map(it => it.isAdvisory ? advisoryCardHtml(it.record) : projectCardHtml(it.record, it.kind))
        .join('') || '<div class="meta">No items yet.</div>';
    }

    function openProjectFromCard(btn) {
      const card = btn.closest('[data-project-id]');
      if (!card) return;
      const projectId = card.getAttribute('data-project-id');
      const sel = card.querySelector('.proj-version-select');
      const raw = sel && sel.value ? Number(sel.value) : NaN;
      const payload = { projectId, source: 'projects' };
      if (!Number.isNaN(raw) && raw > 0) payload.projectSnapshotVersion = raw;
      App.RouterNav.goto('preview.html', payload);
    }

    async function openAdvisoryFromCard(btn) {
      const card = btn.closest('[data-advisory-id]');
      if (!card) return;
      const id = card.getAttribute('data-advisory-id');
      const adv = await App.AdvisoryDB.getAdvisoryById(id);
      if (!adv || !adv.workspace) { alert('This advisory has no saved content to open.'); return; }
      // Seed the live workspace and open the preview with no project context so
      // ui_controller.loadWorkspace() hydrates straight from this advisory.
      try { localStorage.setItem('awareness_newsletter_workspace_v1', JSON.stringify(adv.workspace)); } catch (e) {}
      App.RouterNav.goto('preview.html', { source: 'projects', clearProjectContext: true });
    }

    async function deleteAdvisoryFromCard(btn) {
      const card = btn.closest('[data-advisory-id]');
      if (!card) return;
      const id = card.getAttribute('data-advisory-id');
      if (!confirm('Delete this saved advisory?')) return;
      await App.AdvisoryDB.deleteAdvisory(id);
      await render();
    }

    async function renameProject(projectId) {
      const p = await App.ProjectStore.get(projectId); if (!p) return;
      const title = prompt('New project name', p.title || 'Untitled Project');
      if (!title) return;
      await App.DB.saveProject({ ...p, title });
      await render();
    }
    async function duplicateProject(projectId) {
      const p = await App.ProjectStore.get(projectId); if (!p) return;
      await App.DB.saveProject({ ...p, projectId: `project_${Date.now()}`, title: `${p.title || 'Untitled'} (Copy)` });
      await render();
    }
    async function archiveProject(projectId) {
      const p = await App.ProjectStore.get(projectId); if (!p) return;
      await App.DB.saveProject({ ...p, status: 'archived' });
      await render();
    }
    async function setProjectStatus(projectId, status) {
      const p = await App.ProjectStore.get(projectId); if (!p) return;
      await App.DB.saveProject({ ...p, status });
      await render();
    }
    async function deleteProject(projectId) {
      if (!confirm('Delete this project?')) return;
      await App.ProjectStore.remove(projectId);
      await render();
    }

    document.getElementById('search').addEventListener('input', render);
    document.getElementById('status-filter').addEventListener('change', render);
    document.getElementById('type-filter').addEventListener('change', render);
    document.getElementById('date-filter').addEventListener('change', render);
    document.getElementById('sort-by').addEventListener('change', render);
    document.getElementById('view-grid').addEventListener('click', () => { viewMode = 'grid'; render(); });
    document.getElementById('view-list').addEventListener('click', () => { viewMode = 'list'; render(); });
    document.getElementById('new-project').addEventListener('click', async () => {
      const title = prompt('Project title', 'New Awareness Project');
      if (!title) return;
      const rec = await App.DB.saveProject({ title, status: 'draft', metadata: {}, languageVariants: {}, workflow: null, snapshots: [] });
      App.RouterNav.goto('index.html#section-home', { projectId: rec.projectId, source: 'projects' });
    });
    render();
  </script>
</body>
</html>
