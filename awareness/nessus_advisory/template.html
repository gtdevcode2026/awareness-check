<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cyber Security Advisory</title>
<!--[if mso]><xml><o:OfficeDocumentSettings><o:PixelsPerInch>96</o:PixelsPerInch></o:OfficeDocumentSettings></xml><![endif]-->
</head>
<body style="margin:0;padding:0;background-color:#000000;" bgcolor="#000000">

<!-- Outer wrapper -->
<table width="100%" cellpadding="0" cellspacing="0" border="0" bgcolor="#000000" style="background-color:#000000;">
<tr><td align="center" style="padding:40px 20px;background-color:#000000;" bgcolor="#000000">

  <!-- 950px container -->
  <table width="950" cellpadding="0" cellspacing="0" border="0" bgcolor="#000000" style="background-color:#000000;max-width:950px;">

    <!-- ═══════════════════════════════ HEADER ═══════════════════════════════ -->
    <tr>
      <td bgcolor="#000000" style="background-color:#000000;padding-bottom:40px;">
        <table width="100%" cellpadding="0" cellspacing="0" border="0">
          <tr>

            <!-- Logo box — base64 image injected from logo.txt by cve_alert.py -->
            <td width="240" valign="middle" bgcolor="#000000" style="background-color:#000000;width:240px;height:65px;padding:0 10px;">
              <img src="{{LOGO_SRC}}" alt="Company Logo" width="220" height="55"
                   style="display:block;max-height:55px;max-width:220px;object-fit:contain;border:0;"
                   border="0">
            </td>

            <!-- spacer -->
            <td width="20" bgcolor="#000000" style="background-color:#000000;"></td>

            <!-- Main title -->
            <td valign="bottom" bgcolor="#000000" style="background-color:#000000;padding-bottom:4px;">
              <span style="color:#ffffff;font-family:Arial;font-size:30px;font-weight:bold;letter-spacing:0.5px;display:inline-block;">Cyber Security Advisory</span>
            </td>

            <!-- Meta data (right) -->
            <td valign="top" align="right" bgcolor="#000000" style="background-color:#000000;padding-top:5px;white-space:nowrap;">
              <table cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td valign="top" style="font-size:13px;font-weight:bold;color:#ffffff;font-family:Arial;line-height:1.2;padding-bottom:20px;">Advisory<br>Number</td>
                  <td width="30" bgcolor="#000000" style="background-color:#000000;"></td>
                  <td valign="top" style="font-size:13px;font-weight:bold;color:#ffffff;font-family:Arial;padding-bottom:20px;">{{SEQUENCE_NUMBER}}</td>
                </tr>
                <tr>
                  <td valign="top" style="font-size:13px;font-weight:bold;color:#ffffff;font-family:Arial;line-height:1.2;">Date<br>issued</td>
                  <td width="30" bgcolor="#000000" style="background-color:#000000;"></td>
                  <td valign="top" style="font-size:13px;font-weight:bold;color:#ffffff;font-family:Arial;">{{DATE}}</td>
                </tr>
              </table>
            </td>

          </tr>
        </table>
      </td>
    </tr>

    <!-- ═══════════════════════════════ SUBTITLE ═════════════════════════════ -->
    <tr>
      <td bgcolor="#000000" style="background-color:#000000;padding-bottom:25px;">
        <table width="100%" cellpadding="0" cellspacing="0" border="0">
          <tr>
            <td width="25%" bgcolor="#000000" style="background-color:#000000;"></td>
            <td bgcolor="#000000" style="background-color:#000000;font-size:22px;font-weight:bold;color:#ffffff;font-family:Arial;line-height:1.3;">
              <span style="color:{{SEVERITY_COLOR}};font-size:22px;font-weight:bold;font-family:Arial;">{{SEVERITY}}</span>
              <span style="color:#ffffff;font-size:22px;font-weight:bold;font-family:Arial;"> {{TITLE}}</span>
            </td>
          </tr>
        </table>
      </td>
    </tr>

    <!-- ═══════════════════════════════ OVERVIEW ROW ═════════════════════════ -->
    <tr>
      <td bgcolor="#000000" style="background-color:#000000;border-top:1px solid #eab308;border-bottom:1px solid #eab308;padding:22px 0;">
        <table width="100%" cellpadding="0" cellspacing="0" border="0">
          <tr>
            <td width="25%" valign="top" bgcolor="#000000" style="background-color:#000000;font-size:12px;font-weight:bold;color:#ffffff;font-family:Arial;line-height:1.6;padding-right:20px;">Overview</td>
            <td bgcolor="#000000" style="background-color:#000000;font-size:10px;color:#ffffff;font-family:Arial;line-height:1.6;">{{OVERVIEW}}</td>
          </tr>
        </table>
      </td>
    </tr>

    <!-- ═══════════════════════════════ SUMMARY ROW ══════════════════════════ -->
    <tr>
      <td bgcolor="#000000" style="background-color:#000000;border-bottom:1px solid #eab308;padding:22px 0;">
        <table width="100%" cellpadding="0" cellspacing="0" border="0">
          <tr>
            <td width="25%" valign="top" bgcolor="#000000" style="background-color:#000000;font-size:12px;font-weight:bold;color:#ffffff;font-family:Arial;line-height:1.6;padding-right:20px;">Summary</td>
            <td bgcolor="#000000" style="background-color:#000000;font-size:10px;color:#ffffff;font-family:Arial;line-height:1.6;">{{SUMMARY}}</td>
          </tr>
        </table>
      </td>
    </tr>

    <!-- ═══════════════════════════════ POTENTIAL IMPACT ROW ═════════════════ -->
    <tr>
      <td bgcolor="#000000" style="background-color:#000000;border-bottom:1px solid #eab308;padding:22px 0;">
        <table width="100%" cellpadding="0" cellspacing="0" border="0">
          <tr>
            <td width="25%" valign="top" bgcolor="#000000" style="background-color:#000000;font-size:12px;font-weight:bold;color:#ffffff;font-family:Arial;line-height:1.6;padding-right:20px;">Potential<br>Impact</td>
            <td bgcolor="#000000" style="background-color:#000000;font-size:10px;color:#ffffff;font-family:Arial;line-height:1.6;">{{POTENTIAL_IMPACT}}</td>
          </tr>
        </table>
      </td>
    </tr>

    <!-- ═══════════════════════════════ RECOMMENDATIONS ROW ═════════════════ -->
    <tr>
      <td bgcolor="#000000" style="background-color:#000000;border-bottom:1px solid #eab308;padding:22px 0;">
        <table width="100%" cellpadding="0" cellspacing="0" border="0">
          <tr>
            <td width="25%" valign="top" bgcolor="#000000" style="background-color:#000000;font-size:12px;font-weight:bold;color:#ffffff;font-family:Arial;line-height:1.6;padding-right:20px;">Recommendations</td>
            <td bgcolor="#000000" style="background-color:#000000;font-size:10px;color:#ffffff;font-family:Arial;line-height:1.6;">{{RECOMMENDATIONS}}</td>
          </tr>
        </table>
      </td>
    </tr>

    <!-- ═══════════════════════════════ REFERENCES ROW ═══════════════════════ -->
    <tr>
      <td bgcolor="#000000" style="background-color:#000000;border-bottom:1px solid #eab308;padding:22px 0;">
        <table width="100%" cellpadding="0" cellspacing="0" border="0">
          <tr>
            <td width="25%" valign="top" bgcolor="#000000" style="background-color:#000000;font-size:12px;font-weight:bold;color:#ffffff;font-family:Arial;line-height:1.6;padding-right:20px;text-decoration:underline;">References</td>
            <td bgcolor="#000000" style="background-color:#000000;font-size:10px;color:#ffffff;font-family:Arial;line-height:1.6;">{{REFERENCES}}</td>
          </tr>
        </table>
      </td>
    </tr>

    <!-- bottom padding -->
    <tr><td bgcolor="#000000" style="background-color:#000000;height:40px;"></td></tr>

  </table>
  <!-- /container -->

</td></tr>
</table>
<!-- /outer wrapper -->

</body>
</html>
